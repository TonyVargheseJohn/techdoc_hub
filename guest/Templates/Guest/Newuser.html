<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="tab">
        <h1 align="center">NEW USER</h1>

        {% if messages %}
        <style>
            .modal {
                display: flex;
                position: fixed;
                z-index: 1;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.4);
                justify-content: center;
                align-items: center;
            }

            .modal-content {
                background-color: #fefefe;
                padding: 20px;
                border: 1px solid #888;
                border-radius: 8px;
                width: 80%;
                max-width: 400px;
                text-align: center;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }

            .close-btn {
                background-color: #4CAF50;
                color: white;
                padding: 10px 20px;
                margin-top: 15px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }

            .close-btn:hover {
                background-color: #45a049;
            }
        </style>
        <div id="successModal" class="modal">
            <div class="modal-content">
                {% for message in messages %}
                <h3 style="color: green; margin-top: 0;">{{ message }}</h3>
                {% endfor %}
                <button class="close-btn"
                    onclick="document.getElementById('successModal').style.display='none'">OK</button>
            </div>
        </div>
        {% endif %}

        <table border="2" align="center" cellpadding="10" style="border-collapse: collapse;">
            <form action="" method="post" id="userform" data-place-url="" enctype="multipart/form-data">
                {% csrf_token %}
                <tr>
                    <td>Name</td>
                    <td><input type="text" name="name" autocomplete="off" placeholder="Enter Name" required=""></td>
                </tr>
                <tr>
                    <td>Contact</td>
                    <td><input type="number" name="contact" required="" autocomplete="off" placeholder="0123456789"
                            pattern="[0-9]{10}" required=""></td>
                </tr>
                <tr>
                    <td>EmployeeID</td>
                    <td><input type="number" name="employeid" required="" autocomplete="off" placeholder="0123456789"
                            pattern="[0-9]{10}" required=""></td>
                </tr>
                <tr>
                    <td>Email</td>
                    <td><input type="email" name="email" autocomplete="off" pattern="[^ @]*@[^ @]*"
                            placeholder="Enter Email" id="email" required=""></td>
                </tr>
                <tr>
                    <td>Gender
                    </td>
                    <td><input type="radio" name="gender" value="male" id="" required="" autocomplete="off">Male <input
                            type="radio" name="gender" value="female">Female</td>
                </tr>
                <tr>
                    <td>photo</td>
                    <td><input type="file" name="photo" required="" autocomplete="off"></td>
                </tr>

                <tr>
                    <td>Password</td>
                    <td><input type="password" name="password" placeholder="Enter Password"
                            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                            title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                            required></td>
                </tr>
                <tr>
                    <td colspan="2" align="center"><input type="submit" value="save" name="btn">
                        <input type="reset" value="cancel" name="btnc">
                    </td>

                </tr>
        </table>
        </form>
    </div>
</body>

</html>
