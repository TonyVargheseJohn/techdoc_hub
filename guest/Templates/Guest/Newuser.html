{% include 'guest/Header.html' %}

<style>
    body {
        background-color: #f4f7fe;
        /* Match Login Background */
        background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
        background-size: 30px 30px;
    }

    .register-wrapper {
        padding: 4rem 1rem;
        min-height: calc(100vh - 76px);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .register-card-advanced {
        background: #ffffff;
        border: 1px solid rgba(226, 232, 240, 0.8);
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.05);
        max-width: 600px;
        /* Centralized width, slightly larger than login for columns */
        width: 100%;
        animation: fadeInUp 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    }

    .card-header-auth {
        padding: 2.5rem 2.5rem 1rem;
        text-align: center;
    }

    .auth-icon-wrapper {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #4318FF 0%, #3311DB 100%);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        box-shadow: 0 10px 20px rgba(67, 24, 255, 0.2);
        transform: rotate(-5deg);
        transition: transform 0.3s ease;
    }

    .register-card-advanced:hover .auth-icon-wrapper {
        transform: rotate(0deg) scale(1.05);
    }

    .form-panel {
        padding: 1rem 2.5rem 2.5rem;
    }

    .form-control,
    .form-select {
        border-radius: 12px;
        padding: 0.8rem 1.2rem;
        border: 2px solid #f1f5f9;
        background: #f8fafc;
        transition: all 0.3s ease;
        font-size: 0.95rem;
        font-weight: 500;
        color: #334155;
        height: auto;
    }

    .form-control:focus,
    .form-select:focus {
        background: white;
        border-color: #4318FF;
        box-shadow: 0 0 0 4px rgba(67, 24, 255, 0.1);
        transform: translateY(-2px);
    }

    .form-floating label {
        color: #94a3b8;
        font-weight: 500;
        padding-left: 0.5rem;
    }

    .form-floating>.form-control,
    .form-floating>.form-select {
        height: 3.5rem;
        line-height: 1.25;
    }

    .btn-register-submit {
        background: linear-gradient(135deg, #4318FF 0%, #3311DB 100%);
        color: white;
        border-radius: 12px;
        padding: 1rem;
        font-weight: 700;
        font-size: 1.05rem;
        transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        border: none;
        box-shadow: 0 8px 16px rgba(67, 24, 255, 0.25);
        letter-spacing: 0.5px;
    }

    .btn-register-submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 20px rgba(67, 24, 255, 0.35);
        color: white;
    }
</style>

<div class="register-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 d-flex justify-content-center">
                <div class="register-card-advanced">

                    <div class="card-header-auth">
                        <div class="auth-icon-wrapper">
                            <i class="fa-solid fa-user-plus text-white fs-4"></i>
                        </div>
                        <h3 class="fw-bold text-dark mb-1 h2">Create Account</h3>
                        <p class="text-muted small">Join TechDoc Hub and streamline your workflow.</p>
                    </div>

                    <div class="form-panel">
                        {% if msg %}
                        <div class="alert alert-success alert-dismissible fade show rounded-3 border-0 shadow-sm mb-4 py-2 px-3 small"
                            style="background-color: #e6f9f0; color: #02946c;" role="alert">
                            <i class="fa-solid fa-circle-check me-2"></i> {{ msg }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"
                                style="padding: 0.8rem;"></button>
                        </div>
                        <script>
                            setTimeout(function () {
                                window.location.href = "{% url 'guest:login' %}";
                            }, 2500);
                        </script>
                        {% endif %}

                        <form method="post" action="" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="row g-2">
                                <!-- First Name & Employee ID -->
                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control" name="name" id="name"
                                            placeholder="Full Name" required title="Must contain only letters"
                                            pattern="^[a-zA-Z\s]+$">
                                        <label for="name">Full Name</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control" name="employeid" id="employeid"
                                            placeholder="Employee ID" required>
                                        <label for="employeid">Employee ID</label>
                                    </div>
                                </div>

                                <!-- Email & Contact -->
                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="email" class="form-control" name="email" id="email"
                                            placeholder="Email Address" required>
                                        <label for="email">Email Address</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control" name="contact" id="contact"
                                            placeholder="Contact Number" required title="Must contain exactly 10 digits"
                                            pattern="[0-9]{10}">
                                        <label for="contact">Contact Number</label>
                                    </div>
                                </div>

                                <!-- Gender & Photo -->
                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <select class="form-select" name="gender" id="gender" required>
                                            <option value="" selected disabled>Select Gender</option>
                                            <option value="Male">Male</option>
                                            <option value="Female">Female</option>
                                            <option value="Others">Others</option>
                                        </select>
                                        <label for="gender">Gender</label>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="photo" class="form-label small text-muted ms-2 mb-1 fw-bold">Upload
                                            Profile Photo</label>
                                        <input type="file" class="form-control border-2" name="photo" id="photo"
                                            accept="image/*" required style="padding: 0.6rem 1rem;">
                                    </div>
                                </div>

                                <!-- Password (Full Width) -->
                                <div class="col-12">
                                    <div class="form-floating mb-1">
                                        <input type="password" class="form-control" name="password" id="password"
                                            placeholder="Password" required minlength="8">
                                        <label for="password">Password</label>
                                    </div>
                                    <div class="form-text small text-muted ms-2 mt-0">Must be at least 8 characters.
                                    </div>
                                </div>
                            </div>

                            <!-- Buttons -->
                            <div class="d-grid gap-2 mb-3">
                                <button class="btn btn-register-submit w-100 mb-2" type="submit" name="btn">Register
                                    Account</button>
                            </div>
                            <div class="text-center">
                                <button type="reset" class="btn btn-link text-muted text-decoration-none btn-sm"
                                    name="btnc">Clear Form</button>
                            </div>

                        </form>
                    </div>
                </div>
                <!-- Card End -->

                <div class="text-center mt-3">
                    <p class="text-muted small fw-medium">Already have an account? <a href="{% url 'guest:login' %}"
                            class="fw-bold text-decoration-none" style="color: #4318FF;">Sign in here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

{% include 'guest/Footer.html' %}
