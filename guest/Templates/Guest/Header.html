<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDoc Hub</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        /* Modern Base Styles for Guest section */
        :root {
            --primary-bg: #f4f7fe;
            --primary-color: #4318FF;
            --primary-hover: #3311DB;
            --secondary-color: #05CD99;
            --dark-color: #1B254B;
            --text-color: #A3AED0;
            --text-main: #2B3674;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .navbar-brand,
        .btn {
            font-family: 'Outfit', sans-serif;
        }

        /* Navbar Customization - Glassmorphism */
        .guest-navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            padding: 1rem 0;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .guest-navbar.scrolled {
            padding: 0.5rem 0;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--dark-color) !important;
            font-size: 1.7rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
        }

        .navbar-brand i {
            color: var(--primary-color);
            background: rgba(67, 24, 255, 0.1);
            padding: 0.5rem;
            border-radius: 12px;
            margin-right: 0.75rem;
        }

        .guest-navbar .nav-link {
            font-weight: 500;
            color: var(--text-main) !important;
            margin: 0 0.8rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .guest-navbar .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: -5px;
            left: 50%;
            background-color: var(--primary-color);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 2px;
            transform: translateX(-50%);
        }

        .guest-navbar .nav-link:hover::after,
        .guest-navbar .nav-link.active::after {
            width: 100%;
        }

        .guest-navbar .nav-link:hover {
            color: var(--primary-color) !important;
        }

        .btn-register {
            background: var(--primary-color);
            color: white !important;
            border-radius: 12px;
            padding: 0.6rem 1.8rem !important;
            font-weight: 600;
            letter-spacing: 0.3px;
            box-shadow: 0 10px 20px rgba(67, 24, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            border: none;
            z-index: 1;
        }

        .btn-register::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
            z-index: -1;
        }

        .btn-register:hover::before {
            transform: translateX(100%);
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(67, 24, 255, 0.35);
            background: var(--primary-hover);
        }

        /* Shared Container for content */
        .content-container {
            flex-grow: 1;
        }

        /* Advanced Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate3d(0, 40px, 0);
            }

            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        @keyframes floatEffect {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(67, 24, 255, 0.4);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(67, 24, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(67, 24, 255, 0);
            }
        }

        .animate-up {
            animation: fadeInUp 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            opacity: 0;
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        .delay-4 {
            animation-delay: 0.4s;
        }

        .floating-element {
            animation: floatEffect 6s ease-in-out infinite;
        }
    </style>
</head>

<body>

    <!-- Header Navigation -->
    <nav class="navbar navbar-expand-lg guest-navbar sticky-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="{% url 'guest:Home' %}">
                <i class="fas fa-file-invoice"></i> TechDoc Hub
            </a>
            <button class="navbar-toggler border-0 shadow-none text-primary" type="button" data-bs-toggle="collapse"
                data-bs-target="#guestNav" aria-controls="guestNav" aria-expanded="false"
                aria-label="Toggle navigation">
                <i class="fas fa-bars fs-3"></i>
            </button>
            <div class="collapse navbar-collapse" id="guestNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'guest:Home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'guest:login' %}">Login</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                        <a class="nav-link btn-register" href="{% url 'guest:user_registration' %}">Request Access</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', function () {
            var navbar = document.getElementById('mainNav');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
