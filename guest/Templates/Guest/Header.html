<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDoc Hub</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        /* ===== GUEST DESIGN TOKENS ===== */
        :root {
            --primary-bg: #f4f7fe;
            --primary: #4318FF;
            --primary-hover: #3311DB;
            --primary-light: rgba(67, 24, 255, 0.1);
            --secondary: #05CD99;
            --dark-color: #1B254B;
            --text-muted: #A3AED0;
            --text-main: #2B3674;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.55);
            --shadow-sm: 0 2px 8px rgba(67, 24, 255, 0.07);
            --shadow-md: 0 8px 24px rgba(67, 24, 255, 0.14);
            --radius: 14px;
        }

        /* ===== BODY ===== */
        body {
            background: linear-gradient(135deg, #f4f7fe 0%, #eef2ff 60%, #f0fdf4 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .navbar-brand,
        .btn {
            font-family: 'Outfit', sans-serif;
        }

        /* ===== NAVBAR ===== */
        .guest-navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            padding: 1rem 0;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .guest-navbar.scrolled {
            padding: 0.5rem 0;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--dark-color) !important;
            font-size: 1.75rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .navbar-brand:hover {
            transform: scale(1.04);
        }

        .navbar-brand i {
            color: var(--primary);
            background: var(--primary-light);
            padding: 0.5rem;
            border-radius: 12px;
            margin-right: 0.75rem;
            transition: all 0.3s ease;
        }

        .navbar-brand:hover i {
            background: var(--primary);
            color: white;
            box-shadow: 0 6px 16px rgba(67, 24, 255, 0.35);
        }

        .guest-navbar .nav-link {
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text-main) !important;
            margin: 0 0.5rem;
            padding: 8px 14px !important;
            border-radius: 10px;
            position: relative;
            transition: all 0.3s ease;
        }

        .guest-navbar .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: -4px;
            left: 50%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: all 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 2px;
            transform: translateX(-50%);
        }

        .guest-navbar .nav-link:hover::after,
        .guest-navbar .nav-link.active::after {
            width: 80%;
        }

        .guest-navbar .nav-link:hover {
            color: var(--primary) !important;
            background: var(--primary-light);
        }

        /* Register Button */
        .btn-register {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white !important;
            border-radius: 14px;
            padding: 0.65rem 1.9rem !important;
            font-weight: 700;
            letter-spacing: 0.3px;
            box-shadow: 0 10px 24px rgba(67, 24, 255, 0.28);
            transition: all 0.35s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            border: none;
            z-index: 1;
        }

        .btn-register::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: translateX(-100%);
            transition: 0.55s;
            z-index: -1;
        }

        .btn-register:hover::before {
            transform: translateX(100%);
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 30px rgba(67, 24, 255, 0.4);
        }

        /* Content container */
        .content-container {
            flex-grow: 1;
        }

        /* ===== GLOBAL BUTTONS ===== */
        .btn {
            font-weight: 600;
            letter-spacing: 0.025em;
            border-radius: 12px !important;
            transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease, opacity 0.5s ease;
            opacity: 0;
        }

        .btn:active::after {
            width: 220px;
            height: 220px;
            opacity: 1;
        }

        .btn i {
            transition: transform 0.25s ease;
        }

        .btn:hover i {
            transform: scale(1.18);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%) !important;
            border: none !important;
            box-shadow: 0 4px 16px rgba(67, 24, 255, 0.32) !important;
        }

        .btn-primary:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 10px 26px rgba(67, 24, 255, 0.42) !important;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(5, 205, 153, 0.35);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(239, 68, 68, 0.35);
        }

        .btn-outline-primary {
            border-width: 2px !important;
        }

        .btn-outline-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(67, 24, 255, 0.28);
        }

        /* ===== GLOBAL LINKS ===== */
        a:not(.btn):not(.nav-link):not(.navbar-brand):not(.dropdown-item) {
            color: var(--primary);
            font-weight: 500;
            text-decoration: none;
            position: relative;
            transition: color 0.22s ease;
        }

        a:not(.btn):not(.nav-link):not(.navbar-brand):not(.dropdown-item)::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -2px;
            left: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
            border-radius: 2px;
        }

        a:not(.btn):not(.nav-link):not(.navbar-brand):not(.dropdown-item):hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        a:not(.btn):not(.nav-link):not(.navbar-brand):not(.dropdown-item):hover {
            color: var(--primary-hover);
        }

        /* ===== FORM CONTROLS ===== */
        .form-control,
        .form-select {
            border-radius: var(--radius);
            padding: 12px 18px;
            border: 1.5px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.85);
            font-size: 0.93rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(67, 24, 255, 0.14), 0 2px 10px rgba(67, 24, 255, 0.09);
            background: white;
            outline: none;
        }

        /* ===== CARDS ===== */
        .card {
            border-radius: 20px !important;
            border: 1px solid var(--glass-border) !important;
            box-shadow: var(--shadow-sm) !important;
            backdrop-filter: blur(10px);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md) !important;
            transform: translateY(-2px);
        }

        /* ===== BADGES ===== */
        .badge {
            font-weight: 600;
            letter-spacing: 0.04em;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate3d(0, 40px, 0);
            }

            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        @keyframes floatEffect {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(67, 24, 255, 0.4);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(67, 24, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(67, 24, 255, 0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        .animate-up {
            animation: fadeInUp 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            opacity: 0;
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        .delay-4 {
            animation-delay: 0.4s;
        }

        .floating-element {
            animation: floatEffect 6s ease-in-out infinite;
        }
    </style>

</head>

<body>

    <!-- Header Navigation -->
    <nav class="navbar navbar-expand-lg guest-navbar sticky-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="{% url 'guest:Home' %}">
                <i class="fas fa-file-invoice"></i> TechDoc Hub
            </a>
            <button class="navbar-toggler border-0 shadow-none text-primary" type="button" data-bs-toggle="collapse"
                data-bs-target="#guestNav" aria-controls="guestNav" aria-expanded="false"
                aria-label="Toggle navigation">
                <i class="fas fa-bars fs-3"></i>
            </button>
            <div class="collapse navbar-collapse" id="guestNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'guest:Home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'guest:login' %}">Login</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                        <a class="nav-link btn-register" href="{% url 'guest:user_registration' %}">Request Access</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', function () {
            var navbar = document.getElementById('mainNav');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
