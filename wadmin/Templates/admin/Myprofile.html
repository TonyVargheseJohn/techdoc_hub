{% include 'admin/Header.html' %}

<style>
    .profile-avatar-ring {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--info));
        padding: 4px;
        box-shadow: 0 8px 26px rgba(79, 70, 229, 0.3);
        display: inline-block;
    }

    .profile-info-row td:first-child {
        color: var(--text-muted);
        font-weight: 700;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        width: 35%;
        padding: 11px 10px;
    }

    .profile-info-row td:last-child {
        font-weight: 600;
        color: var(--text-main);
        padding: 11px 10px;
    }

    .profile-info-row:hover td {
        background: rgba(79, 70, 229, 0.04);
    }
</style>

<div class="row justify-content-center mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 text-center p-5" style="animation: fadeInUp 0.55s ease both;">
            <!-- Avatar -->
            <div class="mb-4">
                <div class="profile-avatar-ring mx-auto">
                    {% if data.photo %}
                    <img src="{{ data.photo.url }}" class="rounded-circle w-100 h-100"
                        style="object-fit:cover; border: 3px solid white;" alt="{{ data.name }}">
                    {% else %}
                    <div class="rounded-circle w-100 h-100 d-flex align-items-center justify-content-center"
                        style="background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; font-size: 2.8rem; border: 3px solid white;">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    {% endif %}
                </div>
                <h4 class="fw-bold mt-3 mb-1" style="font-size: 1.5rem;">{{ data.name }}</h4>
                <span class="badge"
                    style="background: linear-gradient(135deg, var(--primary), var(--info)); color:white; font-size: 0.82rem; padding: 7px 16px;">
                    <i class="fa-solid fa-shield-halved me-1"></i> Admin &nbsp;|&nbsp; {{ data.employeid }}
                </span>
            </div>

            <!-- Info rows -->
            <table class="table table-borderless text-start align-middle mb-4">
                <tbody>
                    <tr class="profile-info-row">
                        <td><i class="fa-solid fa-phone me-2 text-primary"></i> Contact</td>
                        <td>{{ data.contact }}</td>
                    </tr>
                    <tr class="profile-info-row">
                        <td><i class="fa-solid fa-envelope me-2 text-primary"></i> Email</td>
                        <td>{{ data.email }}</td>
                    </tr>
                    <tr class="profile-info-row">
                        <td><i class="fa-solid fa-venus-mars me-2 text-primary"></i> Gender</td>
                        <td>{{ data.gender }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</div><!-- End .admin-container -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
