{% include 'admin/Header.html' %}

<h2 class="mb-4 text-center">My Profile</h2>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 text-center">
                {% if data.photo %}
                <img src="{{ data.photo.url }}" class="rounded-circle mb-3 shadow" width="150" height="150"
                    style="object-fit: cover;">
                {% else %}
                <div class="rounded-circle bg-secondary text-white d-inline-flex align-items-center justify-content-center mb-3 shadow"
                    style="width: 150px; height: 150px; font-size: 2rem;">
                    <i class="fa-solid fa-user"></i>
                </div>
                {% endif %}

                <h4 class="fw-bold mb-1">{{ data.name }}</h4>
                <p class="text-muted mb-4">{{ data.employeid }}</p>

                <table class="table table-custom text-start">
                    <tbody>
                        <tr>
                            <td class="fw-bold text-muted" width="30%">Contact</td>
                            <td>{{ data.contact }}</td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Email</td>
                            <td>{{ data.email }}</td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Gender</td>
                            <td>{{ data.gender }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</div><!-- End .admin-container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
