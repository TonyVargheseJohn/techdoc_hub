{% include 'admin/Header.html' %}

<style>
    .profile-avatar-ring {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--info));
        padding: 4px;
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        display: inline-block;
        animation: pulse-glow 3s ease-in-out infinite;
    }

    .profile-avatar-ring img,
    .profile-avatar-ring .avatar-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        background: white;
        border: 3px solid white;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .profile-info-row td:first-child {
        color: var(--text-muted);
        font-weight: 700;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        width: 38%;
        padding: 10px 8px;
    }

    .profile-info-row td:last-child {
        font-weight: 600;
        color: var(--text-main);
        padding: 10px 8px;
    }

    .profile-info-row:hover td {
        background: rgba(59, 130, 246, 0.04);
        border-radius: 8px;
    }

    .profile-card {
        animation: fadeInUp 0.55s ease both;
    }
</style>

<div class="row justify-content-center mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 text-center p-4 pt-5 profile-card">

            <!-- Avatar -->
            <div class="mb-4">
                <div class="profile-avatar-ring mx-auto">
                    {% if data.photo %}
                        <img src="{{ data.photo.url }}" alt="{{ data.name }}">
                    {% else %}
                        <div class="avatar-inner"
                            style="background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; font-size: 2.5rem;">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    {% endif %}
                </div>

                <h3 class="mt-3 fw-bold"
                    style="background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;">
                    {{ data.name }}
                </h3>

                <span class="badge"
                    style="background: linear-gradient(135deg, var(--primary), var(--info)); color:white;">
                    <i class="fa-solid fa-shield-halved me-1"></i>
                    Admin | {{ data.employeid }}
                </span>
            </div>

            <!-- Info Table -->
            <table class="table table-borderless text-start align-middle mb-4">
                <tbody>
                    <tr class="profile-info-row">
                        <td><i class="fa-solid fa-phone me-2 text-primary"></i> Contact</td>
                        <td>{{ data.contact }}</td>
                    </tr>
                    <tr class="profile-info-row">
                        <td><i class="fa-solid fa-envelope me-2 text-primary"></i> Email</td>
                        <td>{{ data.email }}</td>
                    </tr>
                    <tr class="profile-info-row">
                        <td><i class="fa-solid fa-venus-mars me-2 text-primary"></i> Gender</td>
                        <td>{{ data.gender }}</td>
                    </tr>
                </tbody>
            </table>

            <!-- Edit Button -->
            <a href="{% url 'wadmin:editprofile' %}" class="btn btn-primary-custom w-100 py-3">
                <i class="fa-solid fa-pen-to-square me-2"></i> Edit Profile
            </a>

        </div>
    </div>
</div>

</div><!-- End .admin-container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ POPUP MESSAGE (ONLY ONCE) -->
{% if messages %}
<script>
    {% for message in messages %}
        alert("{{ message|escapejs }}");
    {% endfor %}
</script>
{% endif %}

</body>
</html>
