<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #10b981;
            --dark-bg: #111827;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
            color: #374151;
            overflow-x: hidden;
            padding-top: 76px;
            /* Space for fixed navbar */
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 15px 0;
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-brand i {
            font-size: 1.6rem;
        }

        .nav-link {
            font-weight: 500;
            color: #4b5563 !important;
            padding: 8px 16px !important;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary-color) !important;
            background: rgba(79, 70, 229, 0.1);
            transform: translateY(-2px);
        }

        /* Nav Dropdown Styling */
        .dropdown-menu {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 10px 0;
            animation: slideUp 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
            display: none;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-item {
            padding: 10px 20px;
            font-weight: 500;
            color: #4b5563;
            transition: all 0.2s;
        }

        .dropdown-item:hover {
            color: var(--primary-color);
            background: rgba(79, 70, 229, 0.08);
            transform: translateX(5px);
        }

        /* Animation Keyframes */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Common Container Style */
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            animation: slideUp 0.6s ease-out;
        }

        /* Styled inputs/buttons globally for forms */
        .form-control,
        .form-select {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary-color) 0%, #4338ca 100%);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(79, 70, 229, 0.3);
            background: linear-gradient(135deg, #4338ca 0%, #3730a3 100%);
            color: white;
        }

        /* Shared Tables */
        .table-custom {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .table-custom thead {
            background: #f9fafb;
            color: #4b5563;
        }

        .table-custom th,
        .table-custom td {
            padding: 15px;
            vertical-align: middle;
            border-color: #f3f4f6;
        }

        /* Logout Button */
        .nav-logout {
            background: #ef4444;
            color: white !important;
            border-radius: 8px;
            padding: 8px 16px !important;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .nav-logout:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>

    <!-- Fixed Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'wadmin:Home' %}">
                <i class="fa-solid fa-microchip"></i> TechDoc Admin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'wadmin:Home' %}"><i
                                class="fa-solid fa-house-chimney me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-users me-1"></i> Users
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{% url 'wadmin:newusers' %}"><i
                                        class="fa-solid fa-user-plus me-2 text-primary"></i>New Requests</a></li>
                            <li><a class="dropdown-item" href="{% url 'wadmin:acceptedusers' %}"><i
                                        class="fa-solid fa-user-check me-2 text-success"></i>Accepted Users</a></li>
                            <li><a class="dropdown-item" href="{% url 'wadmin:rejectedusers' %}"><i
                                        class="fa-solid fa-user-xmark me-2 text-danger"></i>Rejected Users</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-gears me-1"></i> Machines
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{% url 'wadmin:addcategory' %}"><i
                                        class="fa-solid fa-layer-group me-2 text-info"></i>Categories</a></li>
                            <li><a class="dropdown-item" href="{% url 'wadmin:machine' %}"><i
                                        class="fa-solid fa-toolbox me-2 text-warning"></i>Machine Models</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'wadmin:view_uploaded_files' %}"><i
                                class="fa-solid fa-cloud-arrow-down me-1"></i> Uploads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'wadmin:announcement' %}"><i
                                class="fa-solid fa-bullhorn me-1"></i> Announcements</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'wadmin:myprofile' %}"><i
                                class="fa-solid fa-id-badge me-1"></i> Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-logout" href="{% url 'guest:login' %}"><i
                                class="fa-solid fa-right-from-bracket"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Wrapper Starts Here. End it in child templates -->
    <div class="admin-container">
