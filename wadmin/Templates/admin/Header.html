<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* ===== ADMIN DESIGN TOKENS ===== */
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-deeper: #3730a3;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #06b6d4;
            --bg-page: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 40%, #e0e7ff 100%);
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-light: #e5e7eb;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 24px rgba(79, 70, 229, 0.14);
            --shadow-lg: 0 20px 40px rgba(79, 70, 229, 0.2);
            --radius: 12px;
            --radius-lg: 20px;
        }

        /* ===== BODY ===== */
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            padding-top: 80px;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.09);
            padding: 14px 0;
            transition: all 0.35s ease;
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--primary) !important;
            font-size: 1.45rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease;
        }

        .navbar-brand:hover {
            transform: scale(1.04);
        }

        .navbar-brand i {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 6px rgba(79, 70, 229, 0.45));
        }

        /* Nav Links */
        .nav-link {
            font-weight: 600;
            font-size: 0.9rem;
            color: #4b5563 !important;
            padding: 8px 14px !important;
            border-radius: var(--radius);
            transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            letter-spacing: 0.02em;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2.5px;
            background: linear-gradient(90deg, var(--primary), var(--info));
            border-radius: 2px;
            transition: width 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .nav-link:hover::after {
            width: 60%;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary) !important;
            background: rgba(79, 70, 229, 0.08);
        }

        /* Dropdown */
        .dropdown-menu {
            border: none;
            border-radius: var(--radius);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
            padding: 10px 6px;
            animation: dropIn 0.25s ease forwards;
            background: white;
        }

        @keyframes dropIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-item {
            padding: 10px 16px;
            font-weight: 500;
            font-size: 0.9rem;
            border-radius: 8px;
            color: #4b5563;
            transition: all 0.2s ease;
        }

        .dropdown-item:hover {
            color: var(--primary);
            background: rgba(79, 70, 229, 0.07);
            transform: translateX(4px);
        }

        /* Logout */
        .nav-logout {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white !important;
            border-radius: var(--radius) !important;
            padding: 8px 18px !important;
            font-weight: 700;
            letter-spacing: 0.03em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .nav-logout:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }

        .nav-logout::after {
            display: none;
        }

        /* ===== CONTAINER ===== */
        .admin-container {
            max-width: 1260px;
            margin: 0 auto;
            padding: 40px 20px;
            animation: fadeInUp 0.55s cubic-bezier(0.165, 0.84, 0.44, 1) both;
        }

        /* ===== KEYFRAMES ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes rowSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes iconBounce {

            0%,
            100% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.3);
            }

            60% {
                transform: scale(0.9);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        /* ===== TABLES (Global) ===== */
        .table-custom {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .table-custom thead tr {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%) !important;
        }

        .table-custom thead th {
            color: white !important;
            background: transparent !important;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 16px 18px;
            border: none !important;
            white-space: nowrap;
        }

        .table-custom tbody tr {
            transition: all 0.25s ease;
            border-left: 3px solid transparent;
            animation: rowSlide 0.4s ease both;
        }

        .table-custom tbody tr:nth-child(even) {
            background: rgba(79, 70, 229, 0.025);
        }

        .table-custom tbody tr:hover {
            background: linear-gradient(90deg, rgba(79, 70, 229, 0.07) 0%, rgba(79, 70, 229, 0.02) 100%);
            border-left-color: var(--primary);
            transform: scale(1.003);
            box-shadow: var(--shadow-sm);
        }

        .table-custom td {
            padding: 15px 18px;
            vertical-align: middle;
            border-color: #f3f4f6;
            font-size: 0.92rem;
            color: var(--text-main);
        }

        /* Stagger row animations */
        .table-custom tbody tr:nth-child(1) {
            animation-delay: 0.05s;
        }

        .table-custom tbody tr:nth-child(2) {
            animation-delay: 0.1s;
        }

        .table-custom tbody tr:nth-child(3) {
            animation-delay: 0.15s;
        }

        .table-custom tbody tr:nth-child(4) {
            animation-delay: 0.2s;
        }

        .table-custom tbody tr:nth-child(5) {
            animation-delay: 0.25s;
        }

        .table-custom tbody tr:nth-child(6) {
            animation-delay: 0.3s;
        }

        .table-custom tbody tr:nth-child(7) {
            animation-delay: 0.35s;
        }

        .table-custom tbody tr:nth-child(8) {
            animation-delay: 0.4s;
        }

        .table-custom tbody tr:nth-child(9) {
            animation-delay: 0.45s;
        }

        .table-custom tbody tr:nth-child(10) {
            animation-delay: 0.5s;
        }

        /* ===== BUTTONS (Global) ===== */
        .btn {
            font-weight: 600;
            letter-spacing: 0.02em;
            border-radius: 10px !important;
            transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease, opacity 0.5s ease;
            opacity: 0;
        }

        .btn:active::after {
            width: 200px;
            height: 200px;
            opacity: 1;
        }

        .btn i {
            transition: transform 0.25s ease;
        }

        .btn:hover i {
            transform: scale(1.18);
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-deeper) 100%);
            border: none;
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.35);
        }

        .btn-primary-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.45);
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-deeper) 100%);
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%) !important;
            border: none !important;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3) !important;
        }

        .btn-primary:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 10px 24px rgba(79, 70, 229, 0.4) !important;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-outline-primary {
            border-width: 2px;
        }

        .btn-outline-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(79, 70, 229, 0.3);
        }

        .btn-outline-danger {
            border-width: 2px;
        }

        .btn-outline-success {
            border-width: 2px;
        }

        .btn-outline-info {
            border-width: 2px;
        }

        /* ===== LINKS ===== */
        a:not(.btn):not(.nav-link):not(.navbar-brand):not(.dropdown-item):not(.stat-card) {
            color: var(--primary);
            font-weight: 500;
            position: relative;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:not(.btn):not(.nav-link):not(.navbar-brand):not(.dropdown-item):not(.stat-card)::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -2px;
            left: 0;
            background: linear-gradient(90deg, var(--primary), var(--info));
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
            border-radius: 2px;
        }

        a:not(.btn):not(.nav-link):not(.navbar-brand):not(.dropdown-item):not(.stat-card):hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        a:not(.btn):not(.nav-link):not(.navbar-brand):not(.dropdown-item):not(.stat-card):hover {
            color: var(--primary-dark);
        }

        /* ===== FORM CONTROLS ===== */
        .form-control,
        .form-select {
            border-radius: var(--radius);
            padding: 11px 16px;
            border: 1.5px solid var(--border-light);
            background: #fafbff;
            font-size: 0.92rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15), 0 2px 10px rgba(79, 70, 229, 0.1);
            background: white;
            outline: none;
        }

        /* ===== CARDS ===== */
        .card {
            border-radius: var(--radius-lg) !important;
            border: 1px solid rgba(79, 70, 229, 0.06) !important;
            box-shadow: var(--shadow-sm) !important;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md) !important;
        }

        /* ===== BADGES ===== */
        .badge {
            font-weight: 600;
            letter-spacing: 0.04em;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
        }
    </style>

</head>
