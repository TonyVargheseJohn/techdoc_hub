{% include 'admin/Header.html' %}

<div class="row justify-content-center mb-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 p-4 pb-5" style="border-radius: 16px;">

            <!-- Header -->
            <div class="text-center mb-4">
                <div class="icon-wrapper mx-auto mb-3"
                    style="width: 60px; height: 60px; font-size: 1.5rem;
                    background: linear-gradient(135deg, var(--primary-color), #2563eb);
                    display:flex; align-items:center; justify-content:center; border-radius:50%; color:white;">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <h3 class="fw-bold text-dark">Edit Profile</h3>
                <p class="text-muted small">Update administrator information</p>
            </div>

            <!-- Form -->
            <form method="post">
                {% csrf_token %}

                <div class="row g-3">

                    <!-- Name -->
                    <div class="col-12">
                        <label class="form-label fw-bold text-muted small text-uppercase">Full Name</label>
                        <input type="text" class="form-control"
                               name="name" value="{{ data.name }}" required>
                    </div>

                    <!-- Employee ID (NOW EDITABLE) -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small text-uppercase">Employee ID</label>
                        <input type="text" class="form-control"
                               name="employeid" value="{{ data.employeid }}" required>
                    </div>

                    <!-- Contact -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small text-uppercase">Contact Number</label>
                        <input type="text" class="form-control"
                               name="contact" value="{{ data.contact }}" required>
                    </div>

                    <!-- Email -->
                    <div class="col-12">
                        <label class="form-label fw-bold text-muted small text-uppercase">Email Address</label>
                        <input type="email" class="form-control"
                               name="email" value="{{ data.email }}" required>
                    </div>

                    <!-- Buttons -->
                    <div class="col-12 text-center mt-4">
                        <button type="submit" class="btn btn-primary-custom px-5 py-2">
                            <i class="fa-solid fa-check me-2"></i> Update Profile
                        </button>

                        <a href="{% url 'wadmin:myprofile' %}"
                           class="btn btn-light px-4 py-2 text-dark border ms-2">
                           <i class="fa-solid fa-xmark me-2"></i> Cancel
                        </a>
                    </div>

                </div>
            </form>

        </div>
    </div>
</div>

</div><!-- End .admin-container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Popup message (only once) -->
{% if messages %}
<script>
{% for message in messages %}
alert("{{ message|escapejs }}");
{% endfor %}
</script>
{% endif %}

</body>
</html>
