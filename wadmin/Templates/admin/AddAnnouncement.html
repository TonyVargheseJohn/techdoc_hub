{% include 'admin/Header.html' %}

<div class="row mb-5 justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-4">
            <h3 class="mb-4 fw-bold text-center">Add Announcement</h3>
            <form action="" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Title</label>
                    <input type="text" class="form-control" name="title" value="{{announcement.title}}"
                        placeholder="Enter Title" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea class="form-control" name="description" rows="3"
                        required>{{announcement.description}}</textarea>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                    <button type="submit" class="btn btn-primary-custom px-4"><i class="fa-solid fa-bullhorn"></i> Post
                        Announcement</button>
                    <button type="reset" class="btn btn-secondary px-4"><i class="fa-solid fa-rotate-left"></i>
                        Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-0 table-responsive">
        <table class="table table-custom table-hover m-0 w-100 text-center align-middle">
            <thead>



                <tr>
                    <th>Sl.No</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>

                {% for i in data %}
                <tr>
                    <td>{{forloop.counter}}</td>
                    <td class="fw-bold text-primary">{{i.title}}</td>
                    <td class="text-muted"><small>{{i.description}}</small></td>
                    <td>
                        <div class="btn-group shadow-sm">
                            <a href="{% url 'wadmin:editannouncement' i.id %}" class="btn btn-sm btn-outline-primary"><i
                                    class="fa-solid fa-pen-to-square"></i></a>
                            <a href="{% url 'wadmin:deleteannouncement' i.id %}"
                                class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</div><!-- End .admin-container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
