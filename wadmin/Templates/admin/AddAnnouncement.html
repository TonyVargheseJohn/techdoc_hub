{% include 'admin/Header.html' %}

<div class="container py-4">
    <div class="row mb-5 justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 p-4" style="border-radius: 20px;">
                <h3 class="mb-4 fw-bold text-center" style="color: var(--primary);">
                    {% if announcement %} Edit {% else %} Add {% endif %} Announcement
                </h3>

                <form action="" method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">Title</label>
                        <input type="text" class="form-control" name="title"
                               value="{{announcement.title}}"
                               placeholder="Enter Title" required style="border-radius: 10px;">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <textarea class="form-control" name="description"
                                  rows="3" required style="border-radius: 10px;">{{announcement.description}}</textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                        <button type="submit" class="btn btn-primary px-4 shadow-sm" style="border-radius: 10px; background: var(--primary);">
                            <i class="fa-solid fa-check-double me-2"></i> Save Changes
                        </button>

                        <a href="{% url 'wadmin:announcement' %}" class="btn btn-secondary px-4 shadow-sm" style="border-radius: 10px;">
                            <i class="fa-solid fa-xmark me-2"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0" style="border-radius: 20px; overflow: hidden;">
        <div class="card-body p-0 table-responsive">
            <table class="table table-custom table-hover m-0 w-100 text-center align-middle">
                <thead class="bg-light">
                    <tr>
                        <th>Sl.No</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Date & Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in data %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td class="fw-bold text-primary">{{ i.title }}</td>
                        <td class="text-muted"><small>{{ i.description }}</small></td>
                        <td>
                            <span class="badge bg-light text-dark border px-3 py-2">
                                {{ i.created_at|date:"M d, Y • h:i A" }}
                            </span>
                        </td>
                        <td>
                            <div class="btn-group shadow-sm">
                                <a href="{% url 'wadmin:editannouncement' i.id %}" class="btn btn-sm btn-outline-primary">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </a>
                                <a href="{% url 'wadmin:deleteannouncement' i.id %}" 
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirmDelete(event, this.href)">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // 1. Success Message Popup (After Redirect)
    {% if messages %}
        {% for message in messages %}
            Swal.fire({
                icon: 'success',
                title: 'Success!',
                text: "{{ message }}",
                showConfirmButton: false,
                timer: 2500,
                borderRadius: '15px'
            });
        {% endfor %}
    {% endif %}

    // 2. Custom Delete Confirmation
    function confirmDelete(event, url) {
        event.preventDefault();
        Swal.fire({
            title: 'Are you sure?',
            text: "This announcement will be permanently removed!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Yes, delete it!',
            borderRadius: '15px'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = url;
            }
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
