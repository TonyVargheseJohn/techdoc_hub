<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Machine</title>
</head>
<body>

<form action="" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <h1 align="center">Machine</h1>

    <table border="2" align="center" cellpadding="10" style="border-collapse: collapse;">
       
        <tr>
            <td>Category</td>
            <td>
                <select name="category" required>
                    <option value="">--Select Category--</option>
                    {% for c in category %}
                    <option value="{{c.id}}" {% if machine.category.id == c.id %}selected{% endif %}>
                        {{c.category_name}}
                    </option>
                    {% endfor %}
                </select>
            </td>
        </tr>

        <tr>
            <td>Machine Name</td>
            <td>
                <input type="text" name="machine" value="{{machine.machine_name}}" 
                placeholder="Enter Machine Name" required>
            </td>
        </tr>

        <tr>
            <td>Description</td>
            <td>
                <textarea name="description" required>{{machine.description}}</textarea>
            </td>
        </tr>

        <tr>
            <td>Image</td>
            <td>
                <input type="file" name="image">
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Save">
                <input type="reset" value="Cancel">
            </td>
        </tr>

    </table>


    <br><br>


    <table border="1" align="center" cellpadding="10">
        <tr>
            <th>Sl.No</th>
            <th>Category</th>
            <th>Machine</th>
            <th>Description</th>
            <th>Image</th>
            <th>Action</th>
        </tr>

        {% for i in data %}
        <tr>
            <td>{{forloop.counter}}</td>
            <td>{{i.category.category_name}}</td>
            <td>{{i.machine_name}}</td>
            <td>{{i.description}}</td>
            <td>
                {% if i.image %}
                <img src="{{i.image.url}}" width="60">
                {% endif %}
            </td>
            <td>
                <a href="{% url 'wadmin:deletemachine' i.id %}">Delete</a> ||
                <a href="{% url 'wadmin:editmachine' i.id %}">Edit</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</form>

</body>
</html>
