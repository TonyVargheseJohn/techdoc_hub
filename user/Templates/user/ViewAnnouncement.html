<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Announcements</title>
</head>
<body>

<h1 align="center">Latest Announcements</h1>

<table border="1" align="center" cellpadding="10" style="border-collapse: collapse; width:70%;">
    <tr>
        <th>Sl.No</th>
        <th>Title</th>
        <th>Description</th>
        <th>Date</th>
    </tr>

    {% for i in data %}
    <tr>
        <td align="center">{{forloop.counter}}</td>
        <td>{{i.title}}</td>
        <td>{{i.description}}</td>
        <td>{{i.date}}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4" align="center">No Announcements Available</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
