<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #f59e0b;
            --dark-bg: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            color: #334155;
            overflow-x: hidden;
            padding-top: 76px;
            /* Space for fixed navbar */
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 15px 0;
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-brand i {
            font-size: 1.6rem;
        }

        .nav-link {
            font-weight: 500;
            color: #475569 !important;
            padding: 8px 16px !important;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary-color) !important;
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        /* Nav Dropdown Styling */
        .dropdown-menu {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 10px 0;
            animation: slideUp 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
            display: none;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-item {
            padding: 10px 20px;
            font-weight: 500;
            color: #475569;
            transition: all 0.2s;
        }

        .dropdown-item:hover {
            color: var(--primary-color);
            background: rgba(59, 130, 246, 0.08);
            transform: translateX(5px);
        }

        /* Animation Keyframes */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Common Container Style */
        .user-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            animation: slideUp 0.6s ease-out;
        }

        /* Styled inputs/buttons globally for forms */
        .form-control,
        .form-select {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary-color) 0%, #2563eb 100%);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.3);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
        }

        /* Shared Tables */
        .table-custom {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .table-custom thead {
            background: #f8fafc;
            color: #475569;
        }

        .table-custom th,
        .table-custom td {
            padding: 15px;
            vertical-align: middle;
            border-color: #f1f5f9;
        }

        /* Logout Button */
        .nav-logout {
            background: #ef4444;
            color: white !important;
            border-radius: 8px;
            padding: 8px 16px !important;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .nav-logout:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>

    <!-- Fixed Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'webuser:home' %}">
                <i class="fa-solid fa-cube"></i> TechDoc User
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'webuser:home' %}"><i class="fa-solid fa-house-user me-1"></i>
                            Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'webuser:viewmachine' %}"><i
                                class="fa-solid fa-gears me-1"></i> Machines</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'webuser:my_uploads' %}"><i
                                class="fa-solid fa-cloud-arrow-up me-1"></i> My Uploads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'webuser:viewannouncement' %}"><i
                                class="fa-solid fa-bullhorn me-1"></i> Announcements</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'webuser:notifications' %}"><i
                                class="fa-regular fa-bell me-1"></i> Notifications</a>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-circle-user me-1"></i> Profile
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{% url 'webuser:myprofile' %}"><i
                                        class="fa-solid fa-id-card me-2 text-primary"></i>My Profile</a></li>
                            <li><a class="dropdown-item" href="{% url 'webuser:editprofile' %}"><i
                                        class="fa-solid fa-user-pen me-2 text-success"></i>Edit Profile</a></li>
                        </ul>
                    </li>

                    <li class="nav-item ms-2 align-self-center d-none d-lg-block">
                        <form class="d-flex" method="GET" action="{% url 'webuser:search_uploads' %}">
                            <input class="form-control form-control-sm me-1 shadow-sm" type="search" name="search_query"
                                placeholder="Global Search..."
                                style="border-radius: 20px; padding: 5px 15px; width: 150px; border: 1px solid #cbd5e1;">
                            <button class="btn btn-sm btn-primary-custom" type="submit"
                                style="padding: 5px 12px; border-radius: 20px; box-shadow: none;"><i
                                    class="fa-solid fa-search"></i></button>
                        </form>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link nav-logout" href="{% url 'guest:login' %}"><i
                                class="fa-solid fa-right-from-bracket"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Wrapper Starts Here. End it in child templates -->
    <div class="user-container">
