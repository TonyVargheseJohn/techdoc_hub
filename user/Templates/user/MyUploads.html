<!DOCTYPE html>
<html>
<head>
<title>My Uploads</title>
</head>
<body>

<h1 align="center">My Uploaded Files</h1>

<table border="1" align="center" cellpadding="10" width="90%">
<tr>
    <th>Sl.No</th>
    <th>Category</th>
    <th>Machine</th>
    <th>File</th>
    <th>Date</th>
    <th>Action</th>
</tr>

{% for f in uploads %}
<tr>

<td align="center">{{forloop.counter}}</td>

<td align="center">
{{f.machine.category.category_name}}
</td>

<td align="center">
{{f.machine.machine_name}}
</td>

<td align="center">
<a href="{{f.file.url}}" target="_blank">View</a> |
<a href="{{f.file.url}}" download>Download</a>
</td>

<td align="center">
{{f.upload_date}}
</td>

<td align="center">

<form method="post" action="{% url 'webuser:delete_upload' f.id %}"
      onsubmit="return confirm('Delete this file?');">
{% csrf_token %}
<button type="submit" style="background:red;color:white;border:none;padding:6px 12px;border-radius:5px;">
Delete
</button>
</form>

</td>

</tr>

{% empty %}
<tr>
<td colspan="6" align="center">No uploads found</td>
</tr>
{% endfor %}

</table>

</body>
</html>
