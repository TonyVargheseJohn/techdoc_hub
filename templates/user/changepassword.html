{% include 'user/header.html' %}

<style>
    .form-card {
        border-radius: 18px !important;
        border-left: 4px solid var(--primary) !important;
        animation: rowSlide 0.4s ease both;
    }

    .form-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-md) !important;
    }

    .input-box {
        border-radius: 10px !important;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        transition: 0.3s;
    }

    .input-box:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
        outline: none;
    }

    .btn-save {
        background: linear-gradient(135deg,var(--primary),var(--info));
        border: none;
        padding: 10px 25px;
        border-radius: 10px;
        color: white;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 14px rgba(59,130,246,0.4);
    }

    @keyframes rowSlide {
        from {
            opacity: 0;
            transform: translateY(15px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="row justify-content-center mb-4">
    <div class="col-12 text-center">
        <h2 class="fw-bold mb-0"
            style="background: linear-gradient(135deg,var(--primary),var(--primary-dark));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;">
            Change Password
        </h2>
        <p class="text-muted">Update your account password securely.</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">


    <div class="card shadow-sm border-0 p-4 form-card">

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Current Password</label>
                <input type="password" name="currentpassword" class="form-control input-box" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">New Password</label>
                <input type="password" name="newpassword" class="form-control input-box" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input type="password" name="confirmpassword" class="form-control input-box" required>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-save">
                    Change Password
                </button>
            </div>

        </form>

    </div>
</div>


</div>

</div><!-- End container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Django Messages Popup -->

{% if messages %}

<script>
{% for message in messages %}
alert("{{ message }}");
{% endfor %}
</script>

{% endif %}

</body>
</html>
