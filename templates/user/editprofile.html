{% include 'user/header.html' %}

<div class="row justify-content-center mb-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 p-4 pb-5" style="border-radius: 16px;">
            <div class="text-center mb-4">
                <div class="icon-wrapper mx-auto mb-3"
                    style="width: 60px; height: 60px; font-size: 1.5rem; background: linear-gradient(135deg, var(--primary-color) 0%, #2563eb 100%);">
                    <i class="fa-solid fa-user-pen"></i>
                </div>
                <h3 class="fw-bold text-dark">Edit Profile</h3>
                <p class="text-muted small">Update your personal information</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-bold text-muted small text-uppercase">Full Name</label>
                        <input type="text" class="form-control" name="name" value="{{ data.name }}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small text-uppercase">Employee ID</label>
                        <input type="text" class="form-control bg-light" name="employeid" value="{{ data.employeid }}"
                            readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small text-uppercase">Contact Number</label>
                        <input type="text" class="form-control" name="contact" value="{{ data.contact }}" required>
                    </div>

                    <div class="col-12 mb-2">
                        <label class="form-label fw-bold text-muted small text-uppercase">Email Address</label>
                        <input type="email" class="form-control" name="email" value="{{ data.email }}" required>
                    </div>

                    <div class="col-12 text-center mt-4">
                        <button type="submit" class="btn btn-primary-custom px-5 py-2"><i
                                class="fa-solid fa-check me-2"></i> Update Profile</button>
                        <a href="{% url 'webuser:myprofile' %}" class="btn btn-light px-4 py-2 text-dark border ms-2"><i
                                class="fa-solid fa-xmark me-2"></i> Cancel</a>
                    </div>
                </div>
            </form>

        </div>
    </div>
</div>

</div><!-- End .user-container -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% if messages %}
<script>
{% for message in messages %}
alert("{{ message }}");
{% endfor %}
</script>
{% endif %}
</body>

</html>
